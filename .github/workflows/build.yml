name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build VeltryNora ${{ github.ref_name }}
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ─────────────────────────────────────────────────────────────
      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build executable
        shell: bash
        run: wails build -webview2 embed

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: bash
        run: iscc installer.iss

      # ── Release ───────────────────────────────────────────────────────────────
      - name: Extract changelog for ${{ github.ref_name }}
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## v?${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          [ -z "$BODY" ] && BODY="Release ${GITHUB_REF_NAME}"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VeltryNora ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: build/bin/VeltryNora-Setup.exe
