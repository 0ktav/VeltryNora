<div class="page-title"><span style="color:var(--accent)">⊞</span> <span data-i18n="sites.title">Sites</span></div>

<div class="page-content">
  <!-- Active sites -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">
        <div class="dot" style="background: var(--accent)"></div>
        <span data-i18n="sites.active_sites">Active sites</span>
      </div>
    </div>
    <div class="panel-body">
      <div id="sites-search-wrap" style="display:none;margin-bottom:10px">
        <input type="text" id="sites-search" class="input" style="width:100%;font-size:12px" data-i18n="sites.search_placeholder" />
      </div>
      <div id="sites-list">
        <div style="color: var(--text3); font-size: 11px" data-i18n="common.loading">Loading...</div>
      </div>
    </div>
  </div>
</div>

<div style="height: 80px"></div>

<button class="sites-fab" id="sites-fab-btn" data-i18n="sites.new_site">+ New site</button>
