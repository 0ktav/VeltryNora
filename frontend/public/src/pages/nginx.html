<div class="page-title"><span style="color:var(--nginx)">◎</span> <span data-i18n="nginx.title">Nginx</span></div>

<!-- Not installed -->
<div id="nginx-not-installed">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">
        <div class="dot" style="background: var(--warn)"></div>
        <span data-i18n="nginx.not_installed">Nginx is not installed</span>
      </div>
    </div>
    <div class="panel-body">
      <div class="install-row">
        <select id="nginx-available-versions" class="select">
          <option data-i18n="common.loading">Loading...</option>
        </select>
        <button class="btn btn-primary" id="nginx-install-btn" data-i18n="common.install">
          Install
        </button>
      </div>
      <div id="nginx-progress-first" style="display: none">
        <div class="progress-wrap">
          <div
            class="progress-bar"
            id="nginx-progress-bar-first"
            style="width: 0%"
          ></div>
        </div>
        <div class="progress-label" id="nginx-progress-label-first">0%</div>
        <div class="progress-label" id="nginx-progress-size-first" style="color:var(--text3);font-size:12px"></div>
      </div>
    </div>
  </div>
</div>

<!-- Installed -->
<div id="nginx-installed" style="display: none" class="page-content">
  <!-- Active version -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">
        <div
          class="dot"
          id="nginx-status-dot"
          style="background: var(--text3)"
        ></div>
        <span data-i18n="common.active_version">Active version:</span>
        <span
          id="nginx-active-version"
          style="color: var(--accent); margin-left: 6px"
          >--</span
        >
      </div>
      <div class="btn-group">
        <button class="btn btn-primary btn-hidden" id="nginx-start-btn">
          ▷ Start
        </button>
        <button class="btn btn-warning btn-hidden" id="nginx-stop-btn">
          ◼ Stop
        </button>
        <button class="btn btn-secondary btn-hidden" id="nginx-restart-btn">
          ↺ Restart
        </button>
      </div>
    </div>
  </div>

  <!-- Tabs container -->
  <div id="nginx-tabs-container">
    <div class="tab-bar">
      <button class="tab-btn" data-tab="control"><i data-lucide="sliders-horizontal"></i> <span data-i18n="tabs.control">Control</span></button>
      <button class="tab-btn" data-tab="logs"><i data-lucide="scroll-text"></i> <span data-i18n="tabs.logs">Logs</span></button>
    </div>

    <!-- Control tab -->
    <div class="tab-panel" data-tab="control">
      <!-- Installed versions -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="dot" style="background: var(--nginx)"></div>
            <span data-i18n="common.installed_versions">Installed versions</span>
          </div>
          <div class="panel-action" id="nginx-add-btn" data-i18n="common.add_new">
            + Install new version
          </div>
        </div>
        <div class="panel-body">
          <div id="nginx-versions-list" class="php-list"></div>
        </div>
      </div>

      <!-- Global header buffer settings -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="dot" style="background: var(--nginx)"></div>
            <span data-i18n="nginx.header_buffers">Header Buffers</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="php-config-grid" style="grid-template-columns: repeat(2, 1fr)">
            <div class="php-config-field">
              <label class="form-label" data-i18n="nginx.client_header_buffer_size">client_header_buffer_size</label>
              <select id="nginx-client-header-buffer-size" class="select" style="font-family:var(--font-mono);font-size:12px">
                <option value="4k">4k — Default</option>
                <option value="8k">8k — Small JWT</option>
                <option value="16k">16k — JWT / OAuth</option>
                <option value="32k">32k — Large tokens</option>
                <option value="64k">64k — SSO / enterprise</option>
                <option value="164k">164k — Max (local dev)</option>
              </select>
            </div>
            <div class="php-config-field">
              <label class="form-label" data-i18n="nginx.large_client_header_buffers">large_client_header_buffers</label>
              <select id="nginx-large-client-header-buffers" class="select" style="font-family:var(--font-mono);font-size:12px">
                <option value="4 8k">4 × 8k — Default</option>
                <option value="4 16k">4 × 16k — Small JWT</option>
                <option value="4 32k">4 × 32k — JWT / OAuth</option>
                <option value="8 32k">8 × 32k — Large tokens</option>
                <option value="8 64k">8 × 64k — SSO / enterprise</option>
                <option value="16 164k">16 × 164k — Max (local dev)</option>
              </select>
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:12px">
            <button class="btn btn-primary" id="nginx-header-buffers-save" data-i18n="nginx.save_restart">Save &amp; Restart</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Logs tab -->
    <div class="tab-panel" data-tab="logs">
      <div class="panel">
        <div class="panel-header accordion-header" id="nginx-log-toggle" style="cursor:pointer">
          <div class="panel-title">
            <div class="dot" style="background:var(--text3)"></div>
            <span data-i18n="nav.logs">Logs</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <div class="lang-selector" id="nginx-log-tab-selector" style="padding:2px;gap:2px;display:none">
              <button class="lang-btn active" data-log="error" data-i18n="logs.error">Error</button>
              <button class="lang-btn" data-log="access" data-i18n="logs.access">Access</button>
            </div>
            <button class="btn btn-secondary btn-icon" id="nginx-log-refresh-btn" style="display:none"><i data-lucide="refresh-cw"></i></button>
            <button class="btn btn-danger btn-icon" id="nginx-log-clear-btn" style="display:none"><i data-lucide="trash-2"></i></button>
            <i data-lucide="chevron-down" id="nginx-log-chevron" style="color:var(--text3);width:16px;height:16px;transition:transform 0.2s"></i>
          </div>
        </div>
        <div id="nginx-log-body" style="display:none">
          <div style="padding:0">
            <pre id="nginx-log-content" class="log-viewer"><span style="color:var(--text3)" data-i18n="logs.loading">Loading...</span></pre>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /nginx-tabs-container -->

</div>
