<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeltryNora</title>
  </head>
  <body>
    <div class="wrapper">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="logo">
          <div class="logo-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 100 100"
              width="28"
              height="28"
              style="display: block"
            >
              <defs>
                <linearGradient
                  id="hBg"
                  x1="0"
                  y1="0"
                  x2="100"
                  y2="100"
                  gradientUnits="userSpaceOnUse"
                >
                  <stop offset="0%" stop-color="#1a2230" />
                  <stop offset="100%" stop-color="#0d1117" />
                </linearGradient>
                <linearGradient
                  id="hL"
                  x1="20"
                  y1="22"
                  x2="50"
                  y2="76"
                  gradientUnits="userSpaceOnUse"
                >
                  <stop offset="0%" stop-color="#00e5bb" />
                  <stop offset="100%" stop-color="#00b8d4" />
                </linearGradient>
                <linearGradient
                  id="hR"
                  x1="80"
                  y1="22"
                  x2="50"
                  y2="76"
                  gradientUnits="userSpaceOnUse"
                >
                  <stop offset="0%" stop-color="#00c4f0" />
                  <stop offset="100%" stop-color="#00a0cc" />
                </linearGradient>
              </defs>
              <rect width="100" height="100" rx="22" fill="url(#hBg)" />
              <rect
                width="100"
                height="100"
                rx="22"
                fill="none"
                stroke="#ffffff"
                stroke-width="0.5"
                opacity="0.07"
              />
              <polyline
                points="20,22 50,76 80,22"
                fill="none"
                stroke="#00d4aa"
                stroke-width="18"
                stroke-linecap="round"
                stroke-linejoin="round"
                opacity="0.12"
              />
              <line
                x1="20"
                y1="22"
                x2="50"
                y2="76"
                stroke="url(#hL)"
                stroke-width="9.5"
                stroke-linecap="round"
              />
              <line
                x1="80"
                y1="22"
                x2="50"
                y2="76"
                stroke="url(#hR)"
                stroke-width="9.5"
                stroke-linecap="round"
              />
              <circle cx="50" cy="76" r="2.5" fill="#00e5bb" opacity="0.55" />
            </svg>
          </div>
          <span>VeltryNora</span>
        </div>
        <div class="topbar-center">
          <div class="status-dot"></div>
          <span id="hostname">localhost</span>
        </div>
        <div class="topbar-right">
          <div id="update-badge" style="display:none" class="update-badge">
            <span>↑</span>
            <span id="update-badge-version"></span>
          </div>
          <span id="clock" class="time">--:--:--</span>
        </div>
      </div>

      <!-- MAIN -->
      <div class="main">
        <!-- SIDEBAR -->
        <div class="sidebar">
          <div class="sidebar-section">
            <div class="sidebar-label" data-i18n="nav.general">General</div>
            <div class="nav-item active" data-page="dashboard">
              <span class="nav-icon">▦</span>
              <span data-i18n="nav.dashboard">Dashboard</span>
            </div>
            <div class="nav-item" data-page="logs">
              <span class="nav-icon" style="color: var(--text2)">≡</span>
              <span data-i18n="nav.logs">Logs</span>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label" data-i18n="nav.software">Software</div>
            <div class="nav-item" data-page="nginx">
              <span class="nav-icon" style="color: var(--nginx)">◎</span> Nginx
            </div>
            <div class="nav-item" data-page="php">
              <span class="nav-icon" style="color: var(--php)">⬡</span> PHP
              Manager
            </div>
            <div class="nav-item" data-page="redis">
              <span class="nav-icon" style="color: var(--redis)">◉</span> Redis
            </div>
            <div class="nav-item" data-page="mysql">
              <span class="nav-icon" style="color: var(--mysql)">◈</span> MySQL
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label" data-i18n="nav.config">
              Configuration
            </div>
            <div class="nav-item" data-page="sites">
              <span class="nav-icon">⊞</span> Sites
            </div>
            <div class="nav-item" data-page="hosts">
              <span class="nav-icon" style="color:var(--accent2)">⊟</span>
              <span data-i18n="nav.hosts">Hosts</span>
            </div>
            <div class="nav-item" data-page="utils">
              <span class="nav-icon" style="color: var(--accent2)">⚒</span>
              <span data-i18n="nav.utils">Utils</span>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label" data-i18n="nav.app">App</div>
            <div class="nav-item" data-page="settings">
              <span class="nav-icon">⚙</span>
              <span data-i18n="nav.settings">Settings</span>
              <span class="badge new" id="settings-new-badge" style="display:none">New</span>
            </div>
            <div class="nav-item" data-page="about">
              <span class="nav-icon" style="color:var(--text3)">ℹ</span>
              <span data-i18n="nav.about">About</span>
            </div>
          </div>

        </div>

        <!-- CONTENT -->
        <div class="content" id="content"></div>
      </div>
    </div>

    <!-- Floating download card (fixed, does not affect layout) -->
    <div id="dl-float-card" style="display:none">
      <div id="dl-float-header">
        <span id="dl-float-title"></span>
        <button id="dl-float-toggle" type="button">−</button>
      </div>
      <div id="dl-float-body"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
