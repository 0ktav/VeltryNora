<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="20" y1="22" x2="80" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5bb"/>
      <stop offset="100%" stop-color="#00b8d4"/>
    </linearGradient>
    <linearGradient id="vGradRight" x1="80" y1="22" x2="50" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00c4f0"/>
      <stop offset="100%" stop-color="#00a0cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.07"/>

  <!-- Glow layer -->
  <polyline
    points="20,22 50,76 80,22"
    fill="none"
    stroke="#00d4aa"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.12"
  />

  <!-- Left arm -->
  <line
    x1="20" y1="22" x2="50" y2="76"
    stroke="url(#vGrad)"
    stroke-width="9.5"
    stroke-linecap="round"
  />

  <!-- Right arm -->
  <line
    x1="80" y1="22" x2="50" y2="76"
    stroke="url(#vGradRight)"
    stroke-width="9.5"
    stroke-linecap="round"
  />

  <!-- Inner highlight (glass effect) -->
  <polyline
    points="20,22 50,76 80,22"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.10"
  />

  <!-- Tip glow dot -->
  <circle cx="50" cy="76" r="5" fill="#00d4aa" opacity="0.20"/>
  <circle cx="50" cy="76" r="2.5" fill="#00e5bb" opacity="0.55"/>
</svg>
